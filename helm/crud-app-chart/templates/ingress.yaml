# Ingress resource for the application
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crud-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: crud-app.local
    http:
      paths: 
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80